version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bot26
      POSTGRES_USER: bot26user
      POSTGRES_PASSWORD: bot26pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot26user -d bot26"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bot26user:bot26pass@db:5432/bot26
      JWT_SECRET: change-this-in-production-use-a-long-random-string
      FERNET_KEY: "EnsI7ooHFHl8Q1tHQCZUHJz8EHfr9tgsRZA3uvrUG-s="
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
